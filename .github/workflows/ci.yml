name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  MIX_ENV: test

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - elixir: '1.18'
            otp: '27'
            check_formatted: true
            check_credo: true
          - elixir: '1.17'
            otp: '26'
          - elixir: '1.15'
            otp: '25'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          version-type: loose

      - name: Cache deps
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-quality-${{ matrix.elixir }}-${{ matrix.otp }}-${{ env.MIX_ENV }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-quality-${{ matrix.elixir }}-${{ matrix.otp }}-${{ env.MIX_ENV }}-
            ${{ runner.os }}-deps-${{ matrix.elixir }}-${{ matrix.otp }}-${{ env.MIX_ENV }}-
            ${{ runner.os }}-deps-${{ matrix.elixir }}-${{ matrix.otp }}-
            ${{ runner.os }}-deps-

      - name: Cache _build
        id: cache-build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-quality-${{ matrix.elixir }}-${{ matrix.otp }}-${{ env.MIX_ENV }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-quality-${{ matrix.elixir }}-${{ matrix.otp }}-${{ env.MIX_ENV }}-
            ${{ runner.os }}-build-${{ matrix.elixir }}-${{ matrix.otp }}-${{ env.MIX_ENV }}-
            ${{ runner.os }}-build-${{ matrix.elixir }}-${{ matrix.otp }}-
            ${{ runner.os }}-build-

      - name: Cache Dialyzer PLT
        id: cache-plt
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ matrix.elixir }}-${{ matrix.otp }}-
            ${{ runner.os }}-plt-

      - name: Configure Git for private repos
        run: git config --global url."https://${{ secrets.PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          mix deps.get
          mix deps.compile

      - name: Cache Status Report
        run: |
          echo "Cache status for quality job (Elixir ${{ matrix.elixir }}/OTP ${{ matrix.otp }}):"
          echo "- Deps cache hit: ${{ steps.cache-deps.outputs.cache-hit || 'false' }}"
          echo "- Build cache hit: ${{ steps.cache-build.outputs.cache-hit || 'false' }}"
          echo "- PLT cache hit: ${{ steps.cache-plt.outputs.cache-hit || 'false' }}"

      - name: Check formatting
        if: matrix.check_formatted
        run: mix format --check-formatted

      - name: Check for unused dependencies
        if: matrix.check_formatted
        run: mix deps.unlock --check-unused

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run Credo
        if: matrix.check_credo
        run: mix credo --strict

      - name: Build PLT for Dialyzer
        run: mix dialyzer --plt

      - name: Run Dialyzer
        run: mix dialyzer

      - name: Run tests
        run: mix test

      - name: Run tests with coverage (latest version only)
        if: matrix.elixir == '1.18' && matrix.otp == '27'
        run: mix test --cover
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    name: Security Audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'
          version-type: loose

      - name: Cache deps
        id: cache-deps-security
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-security-test-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-security-test-
            ${{ runner.os }}-deps-test-
            ${{ runner.os }}-deps-

      - name: Cache _build
        id: cache-build-security
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-security-test-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-security-test-
            ${{ runner.os }}-build-test-
            ${{ runner.os }}-build-

      - name: Configure Git for private repos
        run: git config --global url."https://${{ secrets.PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: mix deps.get

      - name: Cache Status Report
        run: |
          echo "Cache status for security audit:"
          echo "- Deps cache hit: ${{ steps.cache-deps-security.outputs.cache-hit || 'false' }}"
          echo "- Build cache hit: ${{ steps.cache-build-security.outputs.cache-hit || 'false' }}"

      - name: Run security audit
        run: mix deps.audit

