name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  MIX_ENV: test

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-22.04
    env:
      ELIXIR_VERSION: "1.19"
      OTP_VERSION: "28"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
          version-type: loose

      - name: Cache deps
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-deps-quality-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ env.MIX_ENV }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-quality-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ env.MIX_ENV }}-
            ${{ runner.os }}-deps-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ env.MIX_ENV }}-
            ${{ runner.os }}-deps-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-
            ${{ runner.os }}-deps-

      - name: Cache _build
        id: cache-build
        uses: actions/cache@v5
        with:
          path: _build
          key: ${{ runner.os }}-build-quality-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ env.MIX_ENV }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-quality-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ env.MIX_ENV }}-
            ${{ runner.os }}-build-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ env.MIX_ENV }}-
            ${{ runner.os }}-build-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-
            ${{ runner.os }}-build-

      - name: Cache Dialyzer PLT
        id: cache-plt
        uses: actions/cache@v5
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-
            ${{ runner.os }}-plt-

      - name: Configure Git for private repos
        run: git config --global url."https://${{ secrets.PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          mix deps.get
          mix deps.compile

      - name: Cache Status Report
        run: |
          echo "Cache status for quality job (Elixir ${{ env.ELIXIR_VERSION }}/OTP ${{ env.OTP_VERSION }}):"
          echo "- Deps cache hit: ${{ steps.cache-deps.outputs.cache-hit || 'false' }}"
          echo "- Build cache hit: ${{ steps.cache-build.outputs.cache-hit || 'false' }}"
          echo "- PLT cache hit: ${{ steps.cache-plt.outputs.cache-hit || 'false' }}"

      - name: Check formatting
        run: mix format --check-formatted

      - name: Check for unused dependencies
        run: mix deps.unlock --check-unused

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Check generated components are in sync with templates
        run: mix pulsar.sync --check

      - name: Run Credo
        run: mix credo --strict

      - name: Build PLT for Dialyzer
        run: mix dialyzer --plt

      - name: Run Dialyzer
        run: mix dialyzer

      - name: Run tests with coverage
        run: mix test --cover
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    name: Security Audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          version-type: loose

      - name: Cache deps
        id: cache-deps-security
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-deps-security-test-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-security-test-
            ${{ runner.os }}-deps-test-
            ${{ runner.os }}-deps-

      - name: Cache _build
        id: cache-build-security
        uses: actions/cache@v5
        with:
          path: _build
          key: ${{ runner.os }}-build-security-test-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-security-test-
            ${{ runner.os }}-build-test-
            ${{ runner.os }}-build-

      - name: Configure Git for private repos
        run: git config --global url."https://${{ secrets.PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: mix deps.get

      - name: Cache Status Report
        run: |
          echo "Cache status for security audit:"
          echo "- Deps cache hit: ${{ steps.cache-deps-security.outputs.cache-hit || 'false' }}"
          echo "- Build cache hit: ${{ steps.cache-build-security.outputs.cache-hit || 'false' }}"

      - name: Run security audit
        run: mix deps.audit

  browser:
    name: Browser a11y
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          version-type: loose

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Cache deps
        id: cache-deps-browser
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-deps-browser-test-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-browser-test-
            ${{ runner.os }}-deps-test-
            ${{ runner.os }}-deps-

      - name: Cache _build
        id: cache-build-browser
        uses: actions/cache@v5
        with:
          path: _build
          key: ${{ runner.os }}-build-browser-test-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-browser-test-
            ${{ runner.os }}-build-test-
            ${{ runner.os }}-build-

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('test/support/dev_app/assets/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Cache Status Report
        run: |
          echo "Cache status for browser a11y job:"
          echo "- Deps cache hit: ${{ steps.cache-deps-browser.outputs.cache-hit || 'false' }}"
          echo "- Build cache hit: ${{ steps.cache-build-browser.outputs.cache-hit || 'false' }}"
          echo "- Playwright cache hit: ${{ steps.cache-playwright.outputs.cache-hit || 'false' }}"

      - name: Configure Git for private repos
        run: git config --global url."https://${{ secrets.PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install Elixir deps
        run: mix deps.get

      - name: Install Tailwind + esbuild binaries
        env:
          MIX_ENV: test
        run: |
          mix tailwind.install --if-missing
          mix esbuild.install --if-missing

      - name: Build dev_app assets
        env:
          MIX_ENV: test
        run: mix assets.build

      - name: Install Playwright npm package
        run: npm --prefix test/support/dev_app/assets ci

      - name: Install Playwright browsers
        run: npx --prefix test/support/dev_app/assets playwright install --with-deps chromium

      - name: Run browser a11y tests (with 1 retry)
        run: |
          # --max-cases 1 serializes modules on the 2-core shared runner so the
          # single-browser pool doesn't starve setup_all callbacks. See
          # config/test.exs and the phoenix_test_playwright README's
          # "Test failure in CI (timeout)" section.
          if mix test --only integration --max-cases 1; then
            exit 0
          fi
          echo "::warning::Browser a11y tests failed on first run; retrying once. Check for flakes."
          mix test --only integration --failed --max-cases 1

