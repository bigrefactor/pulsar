name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  MIX_ENV: test

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - elixir: '1.18'
            otp: '27'
            check_formatted: true
            check_credo: true
          - elixir: '1.17'
            otp: '26'
          - elixir: '1.15'
            otp: '25'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          version-type: loose

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Cache Dialyzer PLT
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Configure Git for private repos
        run: git config --global url."https://${{ secrets.PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          mix deps.get
          mix deps.compile

      - name: Check formatting
        if: matrix.check_formatted
        run: mix format --check-formatted

      - name: Check for unused dependencies
        if: matrix.check_formatted
        run: mix deps.unlock --check-unused

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run Credo
        if: matrix.check_credo
        run: mix credo --strict

      - name: Build PLT for Dialyzer
        run: mix dialyzer --plt

      - name: Run Dialyzer
        run: mix dialyzer

      - name: Run tests
        run: mix test

      - name: Run tests with coverage (latest version only)
        if: matrix.elixir == '1.18' && matrix.otp == '27'
        run: mix coveralls.github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    name: Security Audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'
          version-type: loose

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-security-${{ hashFiles('mix.lock') }}

      - name: Configure Git for private repos
        run: git config --global url."https://${{ secrets.PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: mix deps.get

      - name: Run security audit
        run: mix deps.audit

  package:
    name: Package Validation
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'
          version-type: loose

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-package-${{ hashFiles('mix.lock') }}

      - name: Configure Git for private repos
        run: git config --global url."https://${{ secrets.PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: mix deps.get

      - name: Build package
        run: mix hex.build

      - name: Validate package contents
        run: |
          # Check that required files are included
          tar -tzf pulsar-*.tar | grep -E "(lib/|priv/|README.md|CHANGELOG.md|LICENSE|mix.exs)"
          
          # Check that build artifacts are excluded
          ! tar -tzf pulsar-*.tar | grep -E "(_build/|deps/|.git/|*.beam)"