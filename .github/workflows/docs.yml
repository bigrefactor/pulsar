name: Documentation

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '28'
          version-type: loose

      - name: Cache deps
        id: cache-deps-docs-build
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-deps-docs-build-dev-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-docs-build-dev-
            ${{ runner.os }}-deps-docs-dev-
            ${{ runner.os }}-deps-dev-
            ${{ runner.os }}-deps-

      - name: Cache _build
        id: cache-build-docs-build
        uses: actions/cache@v5
        with:
          path: _build
          key: ${{ runner.os }}-build-docs-build-dev-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-docs-build-dev-
            ${{ runner.os }}-build-docs-dev-
            ${{ runner.os }}-build-dev-
            ${{ runner.os }}-build-

      - name: Configure Git for private repos
        run: git config --global url."https://${{ secrets.PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: mix deps.get

      - name: Cache Status Report
        run: |
          echo "Cache status for docs build:"
          echo "- Deps cache hit: ${{ steps.cache-deps-docs-build.outputs.cache-hit || 'false' }}"
          echo "- Build cache hit: ${{ steps.cache-build-docs-build.outputs.cache-hit || 'false' }}"

      - name: Compile
        run: mix compile

      - name: Generate documentation
        run: mix docs

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./doc

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    needs: [build, validate]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  validate:
    name: Validate Documentation
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '28'
          version-type: loose

      - name: Cache deps
        id: cache-deps-docs-validate
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-deps-docs-validate-dev-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-docs-validate-dev-
            ${{ runner.os }}-deps-docs-dev-
            ${{ runner.os }}-deps-dev-
            ${{ runner.os }}-deps-

      - name: Cache _build
        id: cache-build-docs-validate
        uses: actions/cache@v5
        with:
          path: _build
          key: ${{ runner.os }}-build-docs-validate-dev-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-docs-validate-dev-
            ${{ runner.os }}-build-docs-dev-
            ${{ runner.os }}-build-dev-
            ${{ runner.os }}-build-

      - name: Configure Git for private repos
        run: git config --global url."https://${{ secrets.PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: mix deps.get

      - name: Cache Status Report
        run: |
          echo "Cache status for docs validation:"
          echo "- Deps cache hit: ${{ steps.cache-deps-docs-validate.outputs.cache-hit || 'false' }}"
          echo "- Build cache hit: ${{ steps.cache-build-docs-validate.outputs.cache-hit || 'false' }}"

      - name: Compile
        run: mix compile

      - name: Check for missing @doc annotations
        run: |
          echo "Checking for missing @doc annotations in public functions..."
          mix docs --warnings-as-errors

      - name: Calculate documentation coverage
        run: |
          echo "Calculating documentation coverage..."
          # Count total public functions vs documented functions
          TOTAL=$(grep -r "^  def " lib/ | grep -v "^  defp " | wc -l)
          DOCUMENTED=$(grep -r "@doc" lib/ | wc -l)
          
          if [ $TOTAL -gt 0 ]; then
            COVERAGE=$(($DOCUMENTED * 100 / $TOTAL))
            echo "Documentation coverage: $COVERAGE% ($DOCUMENTED/$TOTAL functions)"
            
            if [ $COVERAGE -lt 80 ]; then
              echo "Documentation coverage below 80% threshold"
              exit 1
            fi
          else
            echo "No public functions found to document"
          fi